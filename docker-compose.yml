services:
  server:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - FLUSH_MS=80
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "80:80"
    environment:
      - VITE_WS_URL=ws://server:8080/ws
    depends_on:
      - server
    restart: unless-stopped
